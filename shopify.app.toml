name = "Social Proof Popups"
client_id = "YOUR_CLIENT_ID"
application_url = "https://YOUR_APP_URL.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "your-dev-store.myshopify.com"

[access_scopes]
scopes = "read_orders,read_products,read_customers,write_script_tags,read_script_tags"

[auth]
redirect_urls = [
  "https://YOUR_APP_URL.com/auth/callback",
  "https://YOUR_APP_URL.com/auth/shopify/callback",
  "https://YOUR_APP_URL.com/exitiframe"
]

[webhooks]
api_version = "2024-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders"

[pos]
embedded = false
